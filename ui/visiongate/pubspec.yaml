name: visiongate
description: VisionGate - AI Smart Access Control System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  intl: ^0.19.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  camera_windows: ^0.2.6+4
  dio: ^5.3.0
  shared_preferences: ^2.2.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/images/

