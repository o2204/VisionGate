<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SignSpeak</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap');

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f2f2f2, #e6e9f0);
            font-family: "Manrope", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 90vw;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background-color: #f8f8f8;
            transition: 0.3s;
        }

        input:focus {
            border-color: black;
            background-color: white;
            outline: none;
            transform: scale(1.02);
        }

        input.error {
            border-color: red;
            animation: shake 0.3s;
        }

        .error-text {
            color: red;
            font-size: 13px;
            display: none;
        }

        input[type=submit] {
            background: black;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type=submit]:hover {
            background: #333;
            transform: translateY(-2px);
        }

        input[type=submit]:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* 🔥 errors style */
        .server-errors {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }

        .server-errors ul {
            list-style: none;
            padding: 0;
        }

        .server-errors li {
            margin: 5px 0;
        }

    </style>
</head>

<body>

    <div class="container">
        <h1>Reset Password</h1>

        {% if errors %}
        <div class="server-errors">
            <ul>
                {% for error in errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form id="resetForm" action="{{ reset_password }}" method="post">

            <!-- 🔥 token -->
            <input type="hidden" name="token" value="{{ token }}">

            <div class="input-group">
                <input id="password" type="password" name="password" placeholder="Enter a new password" required>
            </div>

            <div class="input-group">
                <input id="confirmPassword" type="password" name="confirm_password" placeholder="Confirm password" required>
                <span class="error-text" id="errorText">Passwords do not match</span>
            </div>

            <input type="submit" value="Reset Password">

        </form>
    </div>

    <script>
        const form = document.getElementById("resetForm");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const errorText = document.getElementById("errorText");

        form.addEventListener("submit", function (e) {
            if (password.value !== confirmPassword.value) {
                e.preventDefault();

                confirmPassword.classList.add("error");
                errorText.style.display = "block";

                setTimeout(() => {
                    confirmPassword.classList.remove("error");
                }, 300);
            }
        });
    </script>

</body>

</html>
